<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ICU 업무메뉴얼 로그인</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #d8e9fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20px;
      background-image: url("/login_final_screen.png");
      background-size: cover;
      background-position: center;
      filter: blur(12px) saturate(1.04) brightness(.98);
      transform: scale(1.06);
      z-index: 0;
    }

    .login-stage {
      position: relative;
      z-index: 1;
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      max-width: 520px;
      max-height: 924px;
      background-image: url("/login_final_screen.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      border-radius: 0;
      box-shadow: 0 24px 70px rgba(9, 31, 73, .18);
    }

    .field,
    .login-btn {
      position: absolute;
      left: 14.5%;
      width: 71%;
      border-radius: 18px;
      font-family: inherit;
      outline: none;
    }

    .field {
      height: 5.6%;
      border: 0;
      /* V66: 배경 이미지 안에 그려진 흐린 placeholder가 입력값 아래로 비쳐 보이지 않도록,
         입력 중이거나 값이 있을 때만 실제 입력칸을 불투명하게 덮습니다. */
      background: rgba(255, 255, 255, 0.01);
      color: #0b2f70;
      padding: 0 7%;
      font-size: clamp(14px, 3.7vw, 19px);
      font-weight: 850;
      caret-color: #1267ff;
      transition: background .12s ease, box-shadow .12s ease;
    }

    .field::placeholder { color: transparent; }

    .field:focus,
    .field.has-value {
      background: linear-gradient(180deg, rgba(248, 252, 255, .98), rgba(232, 244, 255, .98));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 0 0 3px rgba(18, 103, 255, .14);
    }

    .field.has-value:not(:focus) {
      box-shadow: inset 0 1px 0 rgba(255,255,255,.85);
    }

    #username { top: 43.2%; }
    #password { top: 55.2%; }

    .login-btn {
      top: 66.9%;
      height: 6.6%;
      border: 0;
      background: rgba(0, 0, 0, 0);
      color: transparent;
      cursor: pointer;
    }

    .login-btn:active { background: rgba(255, 255, 255, .10); }
    .login-btn:disabled {
      cursor: wait;
      background: rgba(255, 255, 255, .12);
    }

    #msg {
      position: absolute;
      left: 14.5%;
      right: 14.5%;
      top: 73.9%;
      min-height: 20px;
      color: #b91c1c;
      font-size: clamp(11px, 3vw, 14px);
      font-weight: 800;
      text-align: center;
      white-space: pre-wrap;
      line-height: 1.35;
      text-shadow: 0 1px 0 rgba(255,255,255,.55);
    }

    @media (max-width: 520px) {
      .login-stage {
        width: 100vw;
        height: 100vh;
        max-width: none;
        max-height: none;
        box-shadow: none;
        background-size: contain;
      }
      .field { border-radius: 13px; }
    }
  </style>
</head>
<body>
  <main class="login-stage" aria-label="ICU 업무메뉴얼 로그인">
    <form id="loginForm">
      <input id="username" class="field" name="username" autocomplete="username" aria-label="아이디" required />
      <input id="password" class="field" name="password" type="password" autocomplete="current-password" aria-label="비밀번호" required />
      <button id="loginBtn" class="login-btn" type="submit" aria-label="로그인">로그인</button>
      <div id="msg"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("loginBtn");
    const fields = Array.from(document.querySelectorAll(".field"));

    function syncFieldState() {
      fields.forEach((field) => {
        field.classList.toggle("has-value", field.value.trim().length > 0);
      });
    }

    fields.forEach((field) => {
      field.addEventListener("input", syncFieldState);
      field.addEventListener("change", syncFieldState);
    });
    syncFieldState();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      btn.disabled = true;

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
          })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "로그인 실패");

        const params = new URLSearchParams(location.search);
        location.href = params.get("next") || "/";
      } catch (err) {
        msg.textContent = err.message || "로그인 중 오류가 발생했습니다.";
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
