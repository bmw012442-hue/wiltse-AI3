<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ICU 업무메뉴얼 로그인</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root {
      --ink:#0f2a5f;
      --muted:#4f6f9f;
      --blue:#1267ff;
      --blue2:#2f80ff;
      --line:rgba(255,255,255,.62);
      --error:#b91c1c;
    }
    * { box-sizing:border-box; }
    html, body { min-height:100%; }
    body {
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",Arial,sans-serif;
      color:var(--ink);
      background:#d9eaff;
      position:relative;
      overflow:hidden;
    }
    body::before {
      content:"";
      position:fixed;
      inset:-18px;
      background-image:url("/login_hospital_bg.png");
      background-size:cover;
      background-position:center;
      filter:blur(6px) saturate(1.08) brightness(.94);
      transform:scale(1.04);
      z-index:-3;
    }
    body::after {
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 28% 15%, rgba(255,255,255,.36), transparent 34%),
        linear-gradient(180deg, rgba(203,226,255,.10), rgba(8,35,82,.48));
      z-index:-2;
      pointer-events:none;
    }
    .box {
      width:min(690px, 92vw);
      border-radius:32px;
      padding:42px 44px 36px;
      background:linear-gradient(145deg, rgba(231,243,255,.52), rgba(201,224,255,.34));
      border:1.4px solid rgba(255,255,255,.62);
      box-shadow:
        0 30px 70px rgba(7,30,70,.30),
        inset 0 1px 0 rgba(255,255,255,.75),
        inset 0 -1px 0 rgba(139,188,255,.28);
      backdrop-filter:blur(18px) saturate(1.16);
      -webkit-backdrop-filter:blur(18px) saturate(1.16);
      position:relative;
      overflow:hidden;
    }
    .box::before {
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 74% 6%, rgba(255,255,255,.32), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.28), transparent 54%);
      pointer-events:none;
    }
    .plus {
      position:absolute;
      right:38px;
      top:40px;
      color:rgba(255,255,255,.34);
      font-size:74px;
      line-height:1;
      font-weight:900;
      user-select:none;
      pointer-events:none;
    }
    .plus.small {
      right:82px;
      top:84px;
      font-size:42px;
      opacity:.8;
    }
    .logo {
      display:flex;
      align-items:center;
      gap:22px;
      margin-bottom:28px;
      position:relative;
      z-index:1;
    }
    .logo-badge {
      width:88px;
      height:88px;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.62);
      color:#1267ff;
      font-size:31px;
      font-weight:950;
      letter-spacing:-.03em;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 12px 28px rgba(24,95,200,.12);
      border:1px solid rgba(255,255,255,.62);
    }
    h1 {
      margin:0 0 8px;
      font-size:clamp(30px, 4.4vw, 44px);
      line-height:1.1;
      color:#0f2a5f;
      font-weight:950;
      letter-spacing:-.05em;
    }
    p {
      margin:0;
      color:#4f6f9f;
      font-size:clamp(15px, 2vw, 19px);
      line-height:1.45;
      font-weight:650;
      letter-spacing:-.02em;
    }
    form {
      position:relative;
      z-index:1;
    }
    label {
      display:block;
      margin:25px 0 10px;
      color:#0f2a5f;
      font-size:19px;
      font-weight:950;
      letter-spacing:-.03em;
    }
    input {
      width:100%;
      border-radius:20px;
      border:1.5px solid rgba(255,255,255,.72);
      background:rgba(255,255,255,.28);
      padding:19px 22px;
      color:#0f2a5f;
      font-size:19px;
      outline:none;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }
    input::placeholder { color:#7f96bd; }
    input:focus {
      border-color:rgba(18,103,255,.72);
      background:rgba(255,255,255,.36);
      box-shadow:0 0 0 4px rgba(18,103,255,.14), inset 0 1px 0 rgba(255,255,255,.62);
    }
    button {
      width:100%;
      margin-top:30px;
      padding:21px 24px;
      border:0;
      border-radius:20px;
      background:linear-gradient(90deg, var(--blue), var(--blue2));
      color:white;
      font-size:24px;
      font-weight:950;
      letter-spacing:-.03em;
      cursor:pointer;
      box-shadow:0 16px 34px rgba(18,103,255,.26);
    }
    button:disabled {
      opacity:.75;
      cursor:wait;
    }
    .msg {
      min-height:24px;
      margin-top:13px;
      color:var(--error);
      font-size:15px;
      font-weight:800;
      white-space:pre-wrap;
    }
    .notice {
      position:relative;
      z-index:1;
      margin-top:24px;
      padding:20px 22px;
      border-radius:20px;
      background:rgba(255,255,255,.28);
      border:1.4px solid rgba(255,255,255,.62);
      color:#143872;
      font-size:16px;
      line-height:1.6;
      font-weight:750;
      letter-spacing:-.02em;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.46);
    }
    .notice strong {
      color:#ff7a00;
      margin-right:8px;
    }
    @media (max-width: 720px) {
      body { padding:16px; }
      .box {
        width:min(94vw, 540px);
        border-radius:26px;
        padding:30px 22px 24px;
      }
      .logo {
        gap:14px;
        align-items:flex-start;
      }
      .logo-badge {
        width:64px;
        height:64px;
        border-radius:18px;
        font-size:23px;
      }
      h1 { font-size:clamp(23px, 7vw, 34px); }
      p { font-size:14px; }
      label {
        margin:18px 0 8px;
        font-size:16px;
      }
      input {
        font-size:16px;
        padding:15px 17px;
        border-radius:16px;
      }
      button {
        margin-top:22px;
        font-size:19px;
        padding:17px;
        border-radius:17px;
      }
      .notice {
        padding:14px 15px;
        font-size:13px;
        border-radius:16px;
      }
      .plus, .plus.small { display:none; }
    }
  </style>
</head>
<body>
  <main class="box">
    <div class="plus">+</div>
    <div class="plus small">+</div>

    <div class="logo">
      <div class="logo-badge">ICU</div>
      <div>
        <h1>ICU 업무메뉴얼 로그인</h1>
        <p>중환자실 재직 간호사용 내부 업무 매뉴얼입니다.</p>
      </div>
    </div>

    <form id="loginForm">
      <label for="username">아이디</label>
      <input id="username" name="username" autocomplete="username" placeholder="아이디를 입력하세요" required />

      <label for="password">비밀번호</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요" required />

      <button id="loginBtn" type="submit">로그인</button>
      <div id="msg" class="msg"></div>
    </form>

    <div class="notice">
      <strong>▣</strong> 이 메뉴얼은 병원 내부 업무 확인 보조용입니다.<br />
      아이디/비밀번호는 부서 내 지정자에게만 공유하세요.
    </div>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("loginBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      btn.disabled = true;
      btn.textContent = "로그인 중...";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "로그인 실패");
        const params = new URLSearchParams(location.search);
        location.href = params.get("next") || "/";
      } catch (err) {
        msg.textContent = err.message || "로그인 중 오류가 발생했습니다.";
      } finally {
        btn.disabled = false;
        btn.textContent = "로그인";
      }
    });
  </script>
</body>
</html>
