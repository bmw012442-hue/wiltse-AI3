<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>ICU 업무메뉴얼</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ICU 업무메뉴얼" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="banner-header">
    <img src="/wiltse_icu_header_banner.png" alt="윌스기념병원 ICU 업무메뉴얼" class="header-banner-img" />
    <button id="logoutBtn" class="logout-btn banner-logout" type="button">로그아웃</button>
  </header>

  <main>
    <section class="warning compact-warning">
      <b>주의</b> 실제 처치·투약·응급상황은 담당의 지시와 병원 최신 프로토콜을 우선하세요.
    </section>

    <section class="ask hero-search">
      <div class="search-title">무엇을 찾으세요?</div>
      <div class="search-subtitle">예: ABGA, CRRT return, 수혈, DKA, Lab bottle, Night 업무</div>

      <textarea id="question" placeholder="검색어를 입력하세요"></textarea>

      <div class="row action-row">
        <button type="button" id="askBtn">AI 답변</button>
        <button type="button" id="searchBtn" class="secondary">카드 검색</button>
        <button type="button" id="clearBtn" class="secondary">초기화</button>
      </div>

      <div class="example-label">예시 검색어</div>
      <div class="quick example-chips">
        <button data-q="ABGA 해석">ABGA</button>
        <button data-q="CRRT return 방법">CRRT return</button>
        <button data-q="수혈 절차">수혈</button>
        <button data-q="Lab bottle 종류와 채혈 순서">Lab bottle</button>
        <button data-q="BST sliding">BST</button>
        <button data-q="DKA protocol">DKA</button>
      </div>
      <div id="loadingHint" class="loading-hint hidden">
        <span class="spinner"></span>
        <span id="loadingText">답변을 준비 중입니다...</span>
      </div>
    </section>

    <section id="startGuide" class="start-guide">
      <div class="guide-card">
        <b>1. AI 답변 또는 카드 검색</b>
        <span>빠른 요약은 AI, 원문 확인은 카드 검색.</span>
      </div>
      <div class="guide-card">
        <b>2. 카드 클릭</b>
        <span>절차·용량·표·사진을 상세로 확인합니다.</span>
      </div>
    </section>

    <details class="menu-drawer">
      <summary>실무 메뉴 전체 보기</summary>
      <section class="main-menu-grid" id="mainMenuGrid">
        <button data-menu-q="응급상황 E-CART 응급약물 응급기구 응급간호 CPR 순서 방법 기록">응급상황<br><small>E-CART · 응급기구 · CPR</small></button>
        <button data-menu-q="임상 약물 항생제 계열 수액 종류 적응증 자주 사용하는 약물">임상 약물<br><small>항생제 · 수액 · 자주 쓰는 약</small></button>
        <button data-menu-q="마약 향정 마약 반환 잔량 보관 마약성 진통제">마약 & 향정<br><small>반환 · 잔량 · 진통제</small></button>
        <button data-menu-q="의료장비 ventilator high flow CRRT infusion syringe pump 제세동기 EKG">의료장비<br><small>Vent · HFNC · CRRT · Pump</small></button>
        <button data-menu-q="수혈 LAB 동의서 전처치 약물 수혈 TIP 기록 확인사항">수혈<br><small>Lab · 동의서 · 기록</small></button>
        <button data-menu-q="검사 검체 혈액검사 참고치 의심질환 영상검사">검사/검체<br><small>Lab · Culture · 영상검사</small></button>
        <button data-menu-q="dressing 각종 LINE drainage 종류 특징 drain 정리">Dressing / LINE<br><small>Drain · Line · 상처</small></button>
        <button data-menu-q="DAY EVENING NIGHT 업무 상세 routine job 실무">DAY / EVENING / NIGHT<br><small>근무별 세부업무</small></button>
        <button data-menu-q="CSR 물품 카운트 이름 생김새 멸균물품">CSR 물품 카운트<br><small>이름 · 생김새</small></button>
        <button data-menu-q="다제내성감염균 VRE CRE CPO MRSA MSSA MRPA 적응 별 항생제 격리">다제내성감염균<br><small>VRE · CRE · MRSA</small></button>
        <button data-menu-q="I O 섭취량 배설량 전해질 교정 K P Mg replacement">I & O<br><small>섭취량 · 배설량 · 전해질</small></button>
        <button data-menu-q="Vital sign BP HR RR BT 활력징후">Vital sign<br><small>BP · HR · RR · BT</small></button>
        <button data-menu-q="ABGA 혈액가스 분석 질환 pH PaCO2 HCO3">ABGA<br><small>혈액가스 · 질환</small></button>
        <button data-menu-q="GCS Mental 사정 gcs tip seizure 종류 항경련제 신경계 증상 질환">GCS / Mental<br><small>Seizure · 항경련제</small></button>
        <button data-menu-q="BST DM 정상 범위 상황대처 bst tip DM 약물 인슐린 종류 혈당 관리">BST / DM<br><small>혈당 · 인슐린 · DM약</small></button>
        <button data-menu-q="질환별 정리 심혈관계 호흡기계 비뇨기계 신경계 소화기계 혈액 종양 내분비계 다발성 질환">질환별 정리<br><small>계통별 ICU 질환</small></button>
        <button data-menu-q="입퇴원 전원 전동 사망 입실 퇴실">입퇴원/전원/사망<br><small>입실 · 전동 · 사후처치</small></button>
        <button data-menu-q="주치의 과별 특이사항 원장님 routine set order">주치의/과별 특이사항<br><small>과별 Routine</small></button>
      </section>
    </details>

    <section id="resultsArea" class="results-area hidden">
      <section id="status" class="status"></section>

      <section id="answerBox" class="answer hidden">
        <h2>AI 답변</h2>
        <div id="answer"></div>
        <h3>참고한 매뉴얼 카드</h3>
        <div id="sources"></div>
      </section>

      <section>
        <h2 id="cardsHeading">검색 결과 카드</h2>
        <div id="cards" class="cards"></div>
      </section>
    </section>
  </main>

  <dialog id="cardDialog">
    <div class="dialog-head">
      <div>
        <h2 id="detailTitle"></h2>
        <p id="detailMeta"></p>
      </div>
      <button id="closeDialog" class="secondary small">닫기</button>
    </div>
    <div id="detailBody" class="detail-body"></div>
  </dialog>


  <script>
    // V47: 이전 PWA/service worker 캐시로 인해 버튼이 먹통처럼 보이는 문제 방지
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(regs => Promise.all(regs.map(reg => reg.unregister())))
        .catch(() => {});
    }
    if ("caches" in window) {
      caches.keys()
        .then(keys => Promise.all(keys.map(key => caches.delete(key))))
        .catch(() => {});
    }
  </script>
  <script src="/data.js?v=47"></script>
  <script src="/app.js?v=47"></script>
</body>
</html>
